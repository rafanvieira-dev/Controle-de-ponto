<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscador de Códigos - DPRJ</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; text-align: center; }
        p { text-align: center; color: #666; margin-bottom: 20px; }
        input[type="text"] { width: 100%; padding: 12px; margin-bottom: 20px; border: 2px solid #27ae60; border-radius: 4px; font-size: 16px; box-sizing: border-box; }
        input[type="text"]:focus { outline: none; border-color: #2ecc71; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 14px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; vertical-align: top; }
        th { background-color: #27ae60; color: white; }
        tr:nth-child(even) { background-color: #f9f9f9; }
        tr:hover { background-color: #f1f1f1; }
        .codigo { font-weight: bold; color: #d35400; font-size: 1.1em; white-space: nowrap; }
        .nenhum { text-align: center; color: #e74c3c; font-weight: bold; padding: 20px; }
        .badge-elimina { color: #c0392b; font-weight: bold; }
        .badge-guarda { color: #2980b9; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>Buscador de Códigos de Arquivamento (DPRJ)</h1>
    <p>Baseado na Tabela Oficial de Classificação enviada.</p>
    
    <input type="text" id="campoBusca" onkeyup="buscarCodigo()" placeholder="Ex: Férias, 0-2-4-2, Veículo, Ação Judicial...">
    
    <table id="tabelaResultados">
        <thead>
            <tr>
                <th width="15%">Código</th>
                <th width="50%">Assunto / Descrição</th>
                <th width="15%">Guarda Corrente</th>
                <th width="20%">Destinação Final</th>
            </tr>
        </thead>
        <tbody id="corpoTabela">
            </tbody>
    </table>
</div>

<script>

        { codigo: "0-0-9", descricao: "ATUAÇÃO DE DEFENSOR PÚBLICO. Ação Rescisória, Revisão Criminal, Suspeição.", corrente: "Enquanto vigora", final: "Guarda Permanente" },
        { codigo: "0-1-0", descricao: "ORGANIZAÇÃO E FUNCIONAMENTO. Elaboração de norma, regulamentação, diretriz.", corrente: "Enquanto vigora", final: "Guarda Permanente" },
        { codigo: "0-1-0-1", descricao: "REGISTRO NOS ÓRGÃOS COMPETENTES. Habilitação jurídica e regularização fiscal.", corrente: "Enquanto vigora", final: "Eliminação" },
        { codigo: "0-1-0-2", descricao: "REGIMENTO. REGULAMENTO. ESTATUTO, ORGANOGRAMA, ESTRUTURA", corrente: "Enquanto vigora", final: "Guarda Permanente" },

        { codigo: "0-1-2-4", descricao: "REGISTRO SONORO, FOTOGRÁFICO E AUDIOVISUAL", corrente: "2 Anos", final: "Guarda Permanente" },
        { codigo: "0-2-0-1", descricao: "IDENTIFICAÇÃO FUNCIONAL. Carteira, cartão, crachá, credencial.", corrente: "Enquanto houver vínculo", final: "Eliminação" },

        { codigo: "0-4-2-6", descricao: "ACIDENTE DE VEÍCULO COM VÍTIMA", corrente: "Até a conclusão da apuração", final: "Eliminação" },
        { codigo: "0-4-3-1", descricao: "INVENTÁRIO DE BENS IMÓVEIS E VEÍCULOS", corrente: "Até a aprovação das contas", final: "Guarda Permanente" },
        { codigo: "0-5-0-1", descricao: "AUDITORIA", corrente: "Até a aprovação das contas", final: "Guarda Permanente" },
        { codigo: "0-5-1-1-2", descricao: "Proposta Orçamentária.", corrente: "Enquanto vigora", final: "Guarda Permanente" },
        { codigo: "0-5-2-2-2-1", descricao: "Pagamento de aquisição de bens/contratação de serviços.", corrente: "Até a aprovação das contas", final: "Eliminação" },
        { codigo: "0-5-7-1", descricao: "TOMADA DE CONTAS Inclusive Tomada de Contas Especial.", corrente: "Até a aprovação das contas", final: "Guarda Permanente" },
        { codigo: "0-6-2-2", descricao: "PROTOCOLO. Recepção, tramitação e expedição de documentos arquivísticos.", corrente: "Enquanto vigora", final: "Eliminação" },
        { codigo: "0-6-2-2-2", descricao: "Registro e autuação de processos. Livro Tombo.", corrente: "Enquanto vigora", final: "Guarda Permanente" },

        { codigo: "0-7-1", descricao: "PLANO E PROJETO DE INFORMÁTICA. Inclui plano de contingência.", corrente: "Enquanto vigora", final: "Guarda Permanente" },
        { codigo: "0-7-2-3", descricao: "AQUISIÇÃO DE SOLUÇÕES DE TECNOLOGIA DA INFORMAÇÃO. Software e certificados.", corrente: "Até a aprovação das contas", final: "Guarda Permanente" },
        { codigo: "0-8-0", descricao: "ASSOCIAÇÕES CULTURAIS, DE AMIGOS E DE DEFENSORES/SERVIDORES.", corrente: "Enquanto vigora", final: "Guarda Permanente" }
    ];

    function formatarDest(texto) {
        if(texto.toLowerCase().includes("elimina")) return `<span class="badge-elimina">${texto}</span>`;
        if(texto.toLowerCase().includes("permanente")) return `<span class="badge-guarda">${texto}</span>`;
        return texto;
    }

    function buscarCodigo() {
        let busca = document.getElementById("campoBusca").value.toLowerCase();
        let corpoTabela = document.getElementById("corpoTabela");
        corpoTabela.innerHTML = ""; 

        if (busca === "") return; 

        let filtrados = baseClassificacao.filter(item => 
            item.descricao.toLowerCase().includes(busca) || 
            item.codigo.includes(busca)
        );

        if (filtrados.length > 0) {
            filtrados.forEach(item => {
                let linha = `<tr>
                                <td class="codigo">${item.codigo}</td>
                                <td>${item.descricao}</td>
                                <td>${item.corrente}</td>
                                <td>${formatarDest(item.final)}</td>
                             </tr>`;
                corpoTabela.innerHTML += linha;
            });
        } else {
            corpoTabela.innerHTML = `<tr><td colspan="4" class="nenhum">Nenhum código encontrado para este assunto.</td></tr>`;
        }
    }
</script>

</body>
</html>
