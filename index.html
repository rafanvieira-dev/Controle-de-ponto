<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscador de Códigos - Tabela de Temporalidade DPRJ</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1000px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        h1 {
            color: #2c3e50;
            text-align: center;
        }
        p {
            text-align: center;
            color: #666;
            margin-bottom: 20px;
        }
        input[type="text"] {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border: 2px solid #27ae60;
            border-radius: 4px;
            font-size: 16px;
            box-sizing: border-box;
            transition: 0.3s;
        }
        input[type="text"]:focus {
            outline: none;
            border-color: #2ecc71;
            box-shadow: 0 0 8px rgba(46, 204, 113, 0.3);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            font-size: 14px;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
            vertical-align: top;
        }
        th {
            background-color: #27ae60;
            color: white;
        }
        tr:nth-child(even) {
            background-color: #f9f9f9;
        }
        tr:hover {
            background-color: #f1f1f1;
        }
        .codigo-destaque {
            font-weight: bold;
            color: #d35400;
            font-size: 1.1em;
            white-space: nowrap;
        }
        .nenhum-resultado {
            text-align: center;
            color: #e74c3c;
            font-weight: bold;
            padding: 20px;
        }
        .badge-elimina { color: #c0392b; font-weight: bold; }
        .badge-guarda { color: #2980b9; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>Buscador Oficial de Códigos (DPRJ)</h1>
    <p>Digite o assunto, documento ou código para encontrar a classificação e prazo de guarda.</p>
    
    <input type="text" id="campoBusca" onkeyup="buscarCodigo()" placeholder="Ex: Férias, Veículo, Ação Judicial, Material de Consumo, 0-2-4-2...">
    
    <table id="tabelaResultados">
        <thead>
            <tr>
                <th width="15%">Código</th>
                <th width="50%">Assunto / Descrição</th>
                <th width="15%">Guarda Corrente</th>
                <th width="20%">Destinação Final</th>
            </tr>
        </thead>
        <tbody id="corpoTabela">
            </tbody>
    </table>
</div>

<script>
    // Base de dados com os códigos mapeados da Tabela de Temporalidade
    const baseClassificacao = [
        { codigo: "0-0-1", descricao: "MODERNIZAÇÃO E REESTRUTURAÇÃO ADMINISTRATIVA. Projetos, estudos e normas.", corrente: "Enquanto vigora", final: "Guarda Permanente" },
        { codigo: "0-0-3-1", descricao: "RELATÓRIO DE ATIVIDADES INSTITUCIONAL (FINAL)", corrente: "Enquanto vigora", final: "Guarda Permanente" },
        { codigo: "0-0-3-2", descricao: "RELATÓRIO DE ATIVIDADES SETORIAL", corrente: "Enquanto vigora", final: "Eliminação" },
        { codigo: "0-0-4", descricao: "FORMALIZAÇÃO DE ACORDO, AJUSTE, CONTRATO E/OU CONVÊNIO. Inclusive Cooperação Técnica.", corrente: "Enquanto vigora", final: "Guarda Permanente" },
        { codigo: "0-0-6-1-1", descricao: "Correição Ordinária e Extraordinária.", corrente: "Enquanto vigora", final: "Eliminação" },
        { codigo: "0-0-6-2-2", descricao: "Inspeção de Controle Interno.", corrente: "Enquanto vigora", final: "Eliminação" },
        { codigo: "0-0-6-3-1-1", descricao: "Manifestação de interesse do cidadão. (Ouvidoria/Dúvidas)", corrente: "Enquanto vigora", final: "Eliminação" },
        { codigo: "0-0-7", descricao: "SANÇÃO ADMINISTRATIVA. Processos que resultem imposição de sanção.", corrente: "Enquanto vigora", final: "Guarda Permanente" },
        { codigo: "0-0-8-1", descricao: "ACOMPANHAMENTO E INSTRUÇÃO DE AÇÃO JUDICIAL (DPRJ como parte).", corrente: "Enquanto vigora", final: "Guarda Permanente" },
        { codigo: "0-1-0-2", descricao: "REGIMENTO. REGULAMENTO. ESTATUTO, ORGANOGRAMA, ESTRUTURA", corrente: "Enquanto vigora", final: "Guarda Permanente" },
        { codigo: "0-1-2-4", descricao: "REGISTRO SONORO, FOTOGRÁFICO E AUDIOVISUAL", corrente: "2 Anos", final: "Guarda Permanente" },
        { codigo: "0-2-0-1", descricao: "IDENTIFICAÇÃO FUNCIONAL. Crachás, carteiras e matrículas.", corrente: "Enquanto houver vínculo", final: "Eliminação" },
        { codigo: "0-2-0-6", descricao: "ASSENTAMENTO FUNCIONAL. CADASTRO. Vida funcional, pasta individual do Servidor.", corrente: "Enquanto houver vínculo", final: "Eliminação" },
        { codigo: "0-2-0-7-1", descricao: "Controle de frequência. Livro de ponto, relógio de ponto, hora extra, abono de faltas.", corrente: "Enquanto vigora", final: "Eliminação" },
        { codigo: "0-2-3-1-1", descricao: "Admissão. Aproveitamento. Contratação. Nomeação. Readmissão.", corrente: "Enquanto houver vínculo", final: "Eliminação" },
        { codigo: "0-2-3-1-2", descricao: "Demissão. Dispensa. Exoneração. Rescisão contratual. Falecimento.", corrente: "Enquanto houver vínculo", final: "Eliminação" },
        { codigo: "0-2-3-1-3", descricao: "Lotação. Remoção. Transferência. Permuta.", corrente: "Enquanto houver vínculo", final: "Eliminação" },
        { codigo: "0-2-4-1", descricao: "FOLHA DE PAGAMENTO, FICHA FINANCEIRA", corrente: "Enquanto vigora", final: "Eliminação" },
        { codigo: "0-2-4-1-0-1", descricao: "Contra cheque. Incluem-se 2ª via e assuntos relacionados.", corrente: "Enquanto vigora", final: "Eliminação" },
        { codigo: "0-2-4-1-2-3", descricao: "Gratificação Natalina (décimo terceiro salário).", corrente: "Enquanto vigora", final: "Eliminação" },
        { codigo: "0-2-4-1-3-1", descricao: "Adicional de Tempo de Serviço. (Triênio e Quinquênio).", corrente: "Enquanto vigora", final: "Guarda Permanente" },
        { codigo: "0-2-4-2", descricao: "FÉRIAS (ASSUNTOS GERAIS). Marcação, escala, cancelamento e transferência.", corrente: "Enquanto vigora", final: "Eliminação" },
        { codigo: "0-2-4-2-1", descricao: "Concessão individual de férias. Atos específicos.", corrente: "Enquanto houver vínculo", final: "Eliminação" },
        { codigo: "0-2-5-1-1", descricao: "Procedimento Administrativo Disciplinar (PAD). Inquéritos e apurações.", corrente: "Até a conclusão", final: "Guarda Permanente" },
        { codigo: "0-2-6-1-5", descricao: "Aposentadoria. Pedido e revisão, pecúnia indenizatória.", corrente: "Enquanto vigora", final: "Guarda Permanente" },
        { codigo: "0-2-6-1-6-1", descricao: "Prontuário Médico do Defensor/Servidor.", corrente: "Enquanto houver vínculo", final: "Eliminação" },
        { codigo: "0-2-7-1", descricao: "MISSÃO FORA DA SEDE/VIAGEM A SERVIÇO NO BRASIL (SEM ÔNUS).", corrente: "Enquanto vigora", final: "Eliminação" },
        { codigo: "0-2-7-2", descricao: "MISSÃO FORA DA SEDE/VIAGEM A SERVIÇO NO BRASIL (COM ÔNUS). Diárias, passagens.", corrente: "Até a aprovação das contas", final: "Eliminação" },
        { codigo: "0-3-1-1-1", descricao: "Compra ou aluguel de material permanente.", corrente: "Até a aprovação das contas", final: "Eliminação" },
        { codigo: "0-3-1-2-1", descricao: "Compra de material de consumo.", corrente: "Até a aprovação das contas", final: "Eliminação" },
        { codigo: "0-3-2-1", descricao: "CONTROLE DE ESTOQUE. Requisição, distribuição e Movimentação.", corrente: "Enquanto vigora", final: "Eliminação" },
        { codigo: "0-3-3-5", descricao: "BAIXA PATRIMONIAL DE MATERIAL.", corrente: "Enquanto vigora", final: "Guarda Permanente" },
        { codigo: "0-4-1-0-2-1", descricao: "Água e esgoto, gás ou energia elétrica (Pagamentos).", corrente: "Até a aprovação das contas", final: "Eliminação" },
        { codigo: "0-4-1-0-2-2", descricao: "Transmissão de dados, voz e imagem (Telefone, Internet).", corrente: "Até a aprovação das contas", final: "Eliminação" },
        { codigo: "0-4-1-1-1", descricao: "Compra de imóvel.", corrente: "Até a aprovação das contas", final: "Guarda Permanente" },
        { codigo: "0-4-1-4-1", descricao: "Reforma. Recuperação. Restauração. Construção.", corrente: "Até a aprovação das contas", final: "Guarda Permanente" },
        { codigo: "0-4-1-5-1", descricao: "Ordem de serviço para limpeza, imunização e desinfestação.", corrente: "Enquanto vigora", final: "Eliminação" },
        { codigo: "0-4-2-1-1", descricao: "Compra ou aluguel de veículo.", corrente: "Até a aprovação das contas", final: "Eliminação" },
        { codigo: "0-4-2-4", descricao: "ABASTECIMENTO, LIMPEZA, MANUTENÇÃO E REPARO DE VEÍCULO.", corrente: "Até a aprovação das contas", final: "Eliminação" },
        { codigo: "0-4-2-6", descricao: "ACIDENTE DE VEÍCULO COM VÍTIMA.", corrente: "Até a conclusão", final: "Eliminação" },
        { codigo: "0-4-3-1", descricao: "INVENTÁRIO DE BENS IMÓVEIS E VEÍCULOS.", corrente: "Até a aprovação das contas", final: "Guarda Permanente" },
        { codigo: "0-5-1-1-2", descricao: "Proposta Orçamentária.", corrente: "Enquanto vigora", final: "Guarda Permanente" },
        { codigo: "0-5-2-2-2-1", descricao: "Pagamento de aquisição de bens ou prestação de serviços.", corrente: "Até a aprovação das contas", final: "Eliminação" },
        { codigo: "0-5-7-1", descricao: "TOMADA DE CONTAS. Inclusive Tomada de Contas Especial.", corrente: "Até a aprovação das contas", final: "Guarda Permanente" },
        { codigo: "0-6-2-2", descricao: "PROTOCOLO. Recepção, tramitação e expedição de documentos arquivísticos.", corrente: "Enquanto vigora", final: "Eliminação" },
        { codigo: "0-6-2-2-2", descricao: "Registro e autuação de processos (Livro Tombo).", corrente: "Enquanto vigora", final: "Guarda Permanente" },
        { codigo: "0-6-2-5-2", descricao: "Eliminação de documentos (Termo, listagem e edital).", corrente: "Enquanto vigora", final: "Guarda Permanente" },
        { codigo: "0-7-1", descricao: "PLANO E PROJETO DE INFORMÁTICA. Inclui plano de contingência.", corrente: "Enquanto vigora", final: "Guarda Permanente" },
        { codigo: "0-7-3-2", descricao: "ASSISTÊNCIA TÉCNICA DE INFORMÁTICA (que envolve pagamento).", corrente: "Até a aprovação das contas", final: "Eliminação" },
        { codigo: "0-8-0", descricao: "ASSOCIAÇÕES CULTURAIS, DE AMIGOS E DE DEFENSORES/SERVIDORES.", corrente: "Enquanto vigora", final: "Guarda Permanente" }
    ];

    // Formata visualmente o texto de Eliminação ou Guarda
    function formatarDestinacao(texto) {
        if(texto.toLowerCase().includes("elimina")) {
            return `<span class="badge-elimina">${texto}</span>`;
        } else if(texto.toLowerCase().includes("permanente")) {
            return `<span class="badge-guarda">${texto}</span>`;
        }
        return texto;
    }

    function buscarCodigo() {
        let busca = document.getElementById("campoBusca").value.toLowerCase();
        let corpoTabela = document.getElementById("corpoTabela");
        
        corpoTabela.innerHTML = ""; 

        if (busca === "") return; // Mostra vazio se não digitar

        let filtrados = baseClassificacao.filter(item => 
            item.descricao.toLowerCase().includes(busca) || 
            item.codigo.includes(busca)
        );

        if (filtrados.length > 0) {
            filtrados.forEach(item => {
                let destFormatada = formatarDestinacao(item.final);
                let linha = `<tr>
                                <td class="codigo-destaque">${item.codigo}</td>
                                <td>${item.descricao}</td>
                                <td>${item.corrente}</td>
                                <td>${destFormatada}</td>
                             </tr>`;
                corpoTabela.innerHTML += linha;
            });
        } else {
            corpoTabela.innerHTML = `<tr><td colspan="4" class="nenhum-resultado">Nenhum resultado encontrado. Revise o termo pesquisado.</td></tr>`;
        }
    }
</script>

</body>
</html>
