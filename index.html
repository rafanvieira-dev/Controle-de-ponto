    // Função para remover acentos
    function removerAcentos(texto) {
        return texto.normalize("NFD").replace(/[\u0300-\u036f]/g, "");
    }

    // Formata visualmente a destinação final
    function formatarDest(texto) {
        if(texto.toLowerCase().includes("elimina")) return `<span class="badge-elimina">${texto}</span>`;
        if(texto.toLowerCase().includes("permanente")) return `<span class="badge-guarda">${texto}</span>`;
        return texto;
    }

    // Função de Busca com o Filtro de Limpeza
    function buscarCodigo() {
        let inputRaw = document.getElementById("campoBusca").value.toLowerCase();
        let corpoTabela = document.getElementById("corpoTabela");
        corpoTabela.innerHTML = ""; 

        if (inputRaw.trim() === "") return; 

        // 1. FILTRO DE LIMPEZA: Remove os termos padrão copiados do sistema
        let textoLimpo = inputRaw
            .replace(/arquivo\s*-\s*código\s*xxx\s*-\s*tipo:/g, "") // Remove o cabeçalho exato
            .replace(/arquivo/g, "")
            .replace(/código xxx/g, "")
            .replace(/código/g, "")
            .replace(/xxx/g, "")
            .replace(/tipo:/g, "")
            .replace(/-/g, " ") // Troca traços por espaço
            .replace(/:/g, " "); // Troca dois pontos por espaço

        // 2. Remove acentos, separa e filtra palavras pequenas (como "de", "da")
        let termosDeBusca = removerAcentos(textoLimpo)
            .split(" ")
            .filter(t => t.trim() !== "" && t.length > 2);

        // Interrompe se, após a limpeza, não houver termos válidos para buscar
        if (termosDeBusca.length === 0) {
            corpoTabela.innerHTML = `<tr><td colspan="4" class="nenhum">Por favor, digite ou cole um assunto válido.</td></tr>`;
            return;
        }

        let filtrados = baseClassificacao.filter(item => {
            let descNorm = removerAcentos(item.descricao.toLowerCase());
            let codNorm = item.codigo.toLowerCase();
            let sinNorm = item.sinonimos ? removerAcentos(item.sinonimos.toLowerCase()) : "";

            // Verifica se TODAS as palavras processadas estão na base
            return termosDeBusca.every(termo => 
                descNorm.includes(termo) || 
                codNorm.includes(termo) || 
                sinNorm.includes(termo)
            );
        });

        // 3. Exibe os resultados
        if (filtrados.length > 0) {
            filtrados.forEach(item => {
                let linha = `<tr>
                                <td class="codigo">${item.codigo}</td>
                                <td>${item.descricao}</td>
                                <td>${item.corrente}</td>
                                <td>${formatarDest(item.final)}</td>
                             </tr>`;
                corpoTabela.innerHTML += linha;
            });
        } else {
            corpoTabela.innerHTML = `<tr><td colspan="4" class="nenhum">Nenhum resultado encontrado. O sistema filtrou e procurou pelas palavras: <b>"${termosDeBusca.join(', ')}"</b>. Tente procurar por palavras mais curtas ou um sinónimo.</td></tr>`;
        }
    }
