<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscador de Códigos - DPRJ</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; text-align: center; }
        p { text-align: center; color: #666; margin-bottom: 20px; }
        input[type="text"] { width: 100%; padding: 12px; margin-bottom: 20px; border: 2px solid #27ae60; border-radius: 4px; font-size: 16px; box-sizing: border-box; }
        input[type="text"]:focus { outline: none; border-color: #2ecc71; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 14px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; vertical-align: top; }
        th { background-color: #27ae60; color: white; }
        tr:nth-child(even) { background-color: #f9f9f9; }
        tr:hover { background-color: #f1f1f1; }
        .codigo { font-weight: bold; color: #d35400; font-size: 1.1em; white-space: nowrap; }
        .nenhum { text-align: center; color: #e74c3c; font-weight: bold; padding: 20px; }
        .badge-elimina { color: #c0392b; font-weight: bold; }
        .badge-guarda { color: #2980b9; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>Buscador Inteligente de Códigos (DPRJ)</h1>
    <p>Digite as palavras-chave, assuntos ou sinônimos (ex: "ferias", "compra veiculo", "organismo internacional"). O sistema ignora acentos.</p>
    
    <input type="text" id="campoBusca" onkeyup="buscarCodigo()" placeholder="Digite os assuntos procurados aqui...">
    
    <table id="tabelaResultados">
        <thead>
            <tr>
                <th width="15%">Código</th>
                <th width="50%">Assunto / Descrição Oficial</th>
                <th width="15%">Guarda Corrente</th>
                <th width="20%">Destinação Final</th>
            </tr>
        </thead>
        <tbody id="corpoTabela">
            </tbody>
    </table>
</div>

        { codigo: "0-2-5-1-2", descricao: "Penalidade Disciplinar. Advertência, suspensão, exclusão, demissão.", corrente: "Até a conclusão", final: "Guarda Permanente", sinonimos: "pad punicao castigo" },

        { codigo: "0-2-6-1-6-1", descricao: "Prontuário Médico do Defensor/Servidor.", corrente: "Enquanto houver vínculo", final: "Eliminação", sinonimos: "saude atestado doença" },
        { codigo: "0-2-7-1", descricao: "MISSÃO FORA DA SEDE / VIAGEM A SERVIÇO NO BRASIL - SEM ÔNUS.", corrente: "Enquanto vigora", final: "Eliminação", sinonimos: "" },
        { codigo: "0-2-7-2", descricao: "MISSÃO FORA DA SEDE / VIAGEM A SERVIÇO NO BRASIL - COM ÔNUS. Ajuda de custo, diária, prestação de contas.", corrente: "Até a aprovação das contas", final: "Eliminação", sinonimos: "passagem hotel alimentação" },
        { codigo: "0-3-1-1-1", descricao: "Compra ou aluguel de material permanente. Importação, leasing.", corrente: "Até a aprovação das contas", final: "Eliminação", sinonimos: "mesa cadeira computador movel equipamento" },
        { codigo: "0-3-1-2-1", descricao: "Compra de material de consumo.", corrente: "Até a aprovação das contas", final: "Eliminação", sinonimos: "papel caneta suprimento escritorio tonner cartucho copo" },
        { codigo: "0-3-2-1", descricao: "CONTROLE DE ESTOQUE. Requisição, distribuição e RMA.", corrente: "Enquanto vigora", final: "Eliminação", sinonimos: "almoxarifado" },
        { codigo: "0-3-3-5", descricao: "BAIXA PATRIMONIAL DE MATERIAL", corrente: "Enquanto vigora", final: "Guarda Permanente", sinonimos: "descarte lixo quebrado" },
        { codigo: "0-4-1-0-2-1", descricao: "Água e esgoto, gás ou energia elétrica.", corrente: "Até a aprovação das contas", final: "Eliminação", sinonimos: "conta luz cedae light" },
        { codigo: "0-4-1-0-2-2", descricao: "Transmissão de dados, voz e imagem. Telefone, Internet.", corrente: "Até a aprovação das contas", final: "Eliminação", sinonimos: "celular wifi rede embratel oi vivo" },
        { codigo: "0-4-1-1-1", descricao: "Compra de imóvel.", corrente: "Até a aprovação das contas", final: "Guarda Permanente", sinonimos: "predio sala terreno casa" },
        { codigo: "0-4-1-4-1", descricao: "Reforma. Recuperação. Restauração. Construção.", corrente: "Até a aprovação das contas", final: "Guarda Permanente", sinonimos: "obra pedreiro conserto predio" },

        { codigo: "0-4-3-1", descricao: "INVENTÁRIO DE BENS IMÓVEIS E VEÍCULOS", corrente: "Até a aprovação das contas", final: "Guarda Permanente", sinonimos: "levantamento contagem" },

        { codigo: "0-5-2-2-2-1", descricao: "Pagamento de aquisição de bens/contratação de serviços.", corrente: "Até a aprovação das contas", final: "Eliminação", sinonimos: "nota fiscal boleto fornecedor" },
        { codigo: "0-5-7-1", descricao: "TOMADA DE CONTAS Inclusive Tomada de Contas Especial.", corrente: "Até a aprovação das contas", final: "Guarda Permanente", sinonimos: "tce" },
        { codigo: "0-6-2-2", descricao: "PROTOCOLO. Recepção, tramitação e expedição de documentos arquivísticos.", corrente: "Enquanto vigora", final: "Eliminação", sinonimos: "malote correio sedex entrega" },
        { codigo: "0-6-2-2-2", descricao: "Registro e autuação de processos. Livro Tombo.", corrente: "Enquanto vigora", final: "Guarda Permanente", sinonimos: "capa processo numeracao" },
        { codigo: "0-6-2-5-2", descricao: "Eliminação de documentos (termo, listagem e edital).", corrente: "Enquanto vigora", final: "Guarda Permanente", sinonimos: "jogar fora destruir picotar fragmentar" },
        { codigo: "0-7-1", descricao: "PLANO E PROJETO DE INFORMÁTICA. Inclui plano de contingência.", corrente: "Enquanto vigora", final: "Guarda Permanente", sinonimos: "ti tecnologia" },
        { codigo: "0-7-2-3", descricao: "AQUISIÇÃO DE SOLUÇÕES DE TECNOLOGIA DA INFORMAÇÃO. Software e certificados.", corrente: "Até a aprovação das contas", final: "Guarda Permanente", sinonimos: "programa licenca antivirus windows office token" },
        { codigo: "0-8-0", descricao: "ASSOCIAÇÕES CULTURAIS, DE AMIGOS E DE DEFENSORES/SERVIDORES.", corrente: "Enquanto vigora", final: "Guarda Permanente", sinonimos: "sindicato clube" }
    ];

    // Função para remover acentos
    function removerAcentos(texto) {
        return texto.normalize("NFD").replace(/[\u0300-\u036f]/g, "");
    }

    // Formata visualmente a destinação final
    function formatarDest(texto) {
        if(texto.toLowerCase().includes("elimina")) return `<span class="badge-elimina">${texto}</span>`;
        if(texto.toLowerCase().includes("permanente")) return `<span class="badge-guarda">${texto}</span>`;
        return texto;
    }

    function buscarCodigo() {
        let inputRaw = document.getElementById("campoBusca").value.toLowerCase();
        let corpoTabela = document.getElementById("corpoTabela");
        corpoTabela.innerHTML = ""; 

        if (inputRaw.trim() === "") return; 

        let termosDeBusca = removerAcentos(inputRaw).split(" ").filter(t => t.trim() !== "");

        let filtrados = baseClassificacao.filter(item => {
            let descNorm = removerAcentos(item.descricao.toLowerCase());
            let codNorm = item.codigo.toLowerCase();
            let sinNorm = item.sinonimos ? removerAcentos(item.sinonimos.toLowerCase()) : "";

            // Verifica se TODAS as palavras digitadas estão presentes na descrição, código ou sinônimos
            return termosDeBusca.every(termo => 
                descNorm.includes(termo) || 
                codNorm.includes(termo) || 
                sinNorm.includes(termo)
            );
        });

        if (filtrados.length > 0) {
            filtrados.forEach(item => {
                let linha = `<tr>
                                <td class="codigo">${item.codigo}</td>
                                <td>${item.descricao}</td>
                                <td>${item.corrente}</td>
                                <td>${formatarDest(item.final)}</td>
                             </tr>`;
                corpoTabela.innerHTML += linha;
            });
        } else {
            corpoTabela.innerHTML = `<tr><td colspan="4" class="nenhum">Nenhum resultado encontrado. Tente outras palavras.</td></tr>`;
        }
    }
</script>

</body>
</html>
